<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新疆钧仪衡环境技术有限公司 · 3D 环视</title>
    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050814;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }

        .demo-title {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            padding: 18px 22px;
            min-width: 340px;
            border: 1px solid rgba(92, 186, 255, 0.28);
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(7, 15, 35, 0.92), rgba(10, 28, 61, 0.72));
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35), inset 0 0 24px rgba(44, 160, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .demo-title::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 4px;
            border-radius: 4px;
            background: linear-gradient(180deg, #2ee8ff, #1a66ff, #7b5cff);
            box-shadow: 0 0 18px rgba(46, 232, 255, 0.8);
        }

        h1 {
            font-size: 20px;
            line-height: 1.35;
            margin: 0;
            color: #f2f8ff;
            letter-spacing: 1px;
        }

        h3 {
            font-size: 13px;
            font-weight: normal;
            line-height: 1.6;
            margin: 8px 0 0;
            color: rgba(220, 235, 255, 0.78);
        }

        .tag-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .tag {
            font-size: 12px;
            color: #bdefff;
            padding: 4px 9px;
            border: 1px solid rgba(75, 211, 255, 0.35);
            border-radius: 999px;
            background: rgba(10, 126, 190, 0.16);
        }

        .info-panel {
            position: absolute;
            right: 24px;
            top: 24px;
            z-index: 10;
            width: 300px;
            padding: 16px 18px;
            border: 1px solid rgba(92, 186, 255, 0.26);
            border-radius: 16px;
            background: rgba(5, 12, 28, 0.82);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(10px);
            color: #d9ecff;
        }

        .panel-title {
            font-size: 15px;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .data-card {
            padding: 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .data-card b {
            display: block;
            font-size: 17px;
            color: #48d9ff;
            margin-bottom: 4px;
        }

        .data-card span {
            font-size: 12px;
            color: rgba(220, 235, 255, 0.72);
        }

        .address {
            font-size: 12px;
            line-height: 1.65;
            color: rgba(220, 235, 255, 0.78);
        }

        .start-btn {
            position: absolute;
            bottom: 26px;
            right: 26px;
            z-index: 10;
            height: 38px;
            padding: 0 20px;
            border: 1px solid rgba(100, 218, 255, 0.45);
            border-radius: 8px;
            background: linear-gradient(135deg, #1A66FF, #00B8FF);
            box-shadow: 0 10px 28px rgba(0, 136, 255, 0.32);
            color: #fff;
            line-height: 38px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .start-btn:hover {
            filter: brightness(1.08);
        }

        .pulse-marker {
            position: relative;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2ee8ff;
            box-shadow: 0 0 16px #2ee8ff, 0 0 36px rgba(46, 232, 255, 0.7);
        }

        .pulse-marker::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            margin-left: -10px;
            margin-top: -10px;
            border-radius: 50%;
            border: 1px solid rgba(46, 232, 255, 0.8);
            animation: pulse 1.8s infinite;
        }

        .marker-label {
            position: absolute;
            left: 25px;
            top: -10px;
            white-space: nowrap;
            padding: 7px 10px;
            border-radius: 8px;
            border: 1px solid rgba(46, 232, 255, 0.35);
            background: rgba(5, 12, 28, 0.88);
            color: #fff;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.85;
            }
            100% {
                transform: scale(4.2);
                opacity: 0;
            }
        }

        .amap-logo,
        .amap-copyright {
            opacity: 0.72;
        }
    </style>
</head>

<body>
    <div class="demo-title">
        <h1>新疆钧仪衡环境技术有限公司 · 区域 3D 环视</h1>
        <h3>围绕企业办公 / 实验场所构建楼体拉升、采样能力展示与自定义镜头动画。</h3>
        <div class="tag-row">
            <span class="tag">环境检测</span>
            <span class="tag">职业卫生</span>
            <span class="tag">检测报告可视化</span>
            <span class="tag">数字驾驶舱</span>
        </div>
    </div>

    <div class="info-panel">
        <div class="panel-title">企业场景信息</div>
        <div class="address">
            名称：新疆钧仪衡环境技术有限公司<br />
            定位坐标：84.870837, 45.556816<br />
            场景区域：新疆钧仪衡环境技术有限公司附近<br />
            说明：已按你提供的经纬度作为 COMPANY_CENTER。
        </div>
        <div class="data-grid">
            <div class="data-card">
                <b>3D</b>
                <span>楼体拉升</span>
            </div>
            <div class="data-card">
                <b>360°</b>
                <span>镜头环视</span>
            </div>
            <div class="data-card">
                <b>CMA</b>
                <span>检测能力</span>
            </div>
            <div class="data-card">
                <b>GIS</b>
                <span>点位联动</span>
            </div>
        </div>
    </div>

    <div class="start-btn" id="startBtn">开始镜头动画</div>
    <div id="map"></div>

    <!-- 将“您申请的key值”替换为你的高德 Web JS API Key -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=	c30886347c00c4c7f2d2621c1fc8b4c8"></script>
    <script src="https://webapi.amap.com/loca?v=2.0.0&key=	c30886347c00c4c7f2d2621c1fc8b4c8"></script>
    <script>
        // 使用你提供的新疆钧仪衡环境技术有限公司经纬度。
        // 高德地图经纬度顺序为：[经度, 纬度]。
        var COMPANY_CENTER = [84.870837, 45.556816];
        var COMPANY_NAME = '新疆钧仪衡环境技术有限公司';

        var map = new AMap.Map('map', {
            viewMode: '3D',
            zoom: 16.4,
            pitch: 52,
            rotation: -18,
            center: COMPANY_CENTER,
            mapStyle: 'amap://styles/darkblue',
            showBuildingBlock: true,
            showLabel: true,
            skyColor: '#071226'
        });

        map.plugin(['AMap.Scale', 'AMap.ToolBar'], function () {
            map.addControl(new AMap.Scale());
            map.addControl(new AMap.ToolBar({ position: 'LB' }));
        });

        var loca = window.loca = new Loca.Container({ map: map });

        loca.ambLight = {
            intensity: 2.3,
            color: '#b8d7ff'
        };
        loca.dirLight = {
            intensity: 0.55,
            color: '#d7e6ff',
            target: [0, 0, 0],
            position: [0, -1, 1]
        };
        loca.pointLight = {
            color: 'rgb(45,170,255)',
            position: [COMPANY_CENTER[0], COMPANY_CENTER[1], 2200],
            intensity: 36,
            distance: 4200
        };

        function createRectFeature(center, width, height, altitude, name, topColor) {
            var lng = center[0];
            var lat = center[1];
            var w = width / 2;
            var h = height / 2;
            return {
                type: 'Feature',
                properties: {
                    h: altitude,
                    name: name,
                    topColor: topColor
                },
                geometry: {
                    type: 'Polygon',
                    coordinates: [[
                        [lng - w, lat - h],
                        [lng + w, lat - h],
                        [lng + w, lat + h],
                        [lng - w, lat + h],
                        [lng - w, lat - h]
                    ]]
                }
            };
        }

        var buildingGeoJSON = {
            type: 'FeatureCollection',
            features: [
                createRectFeature([COMPANY_CENTER[0] - 0.00025, COMPANY_CENTER[1] + 0.00010], 0.00034, 0.00020, 95, '综合办公楼', '#173a68'),
                createRectFeature([COMPANY_CENTER[0] + 0.00018, COMPANY_CENTER[1] + 0.00002], 0.00028, 0.00018, 72, '检测实验楼', '#0e4d6f'),
                createRectFeature([COMPANY_CENTER[0] + 0.00005, COMPANY_CENTER[1] - 0.00024], 0.00042, 0.00014, 52, '样品流转中心', '#12406c'),
                createRectFeature([COMPANY_CENTER[0] - 0.00045, COMPANY_CENTER[1] - 0.00020], 0.00020, 0.00016, 38, '设备保障区', '#16305c')
            ]
        };

        var geo = new Loca.GeoJSONSource({ data: buildingGeoJSON });

        var buildingLayer = window.buildingLayer = new Loca.PolygonLayer({
            zIndex: 120,
            shininess: 16,
            hasSide: true,
            cullface: 'back',
            depth: true
        });

        buildingLayer.setSource(geo);
        buildingLayer.setStyle({
            topColor: function (index, feature) {
                return feature.properties.topColor || '#16375f';
            },
            sideTopColor: '#1d75a8',
            sideBottomColor: '#061323',
            height: function (index, feature) {
                return feature.properties.h;
            },
            textureSize: [960, 640],
            texture: 'https://a.amap.com/Loca/static/loca-v2/demos/images/windows.jpg'
        });
        buildingLayer.setLoca(loca);

        var marker = new AMap.Marker({
            position: COMPANY_CENTER,
            anchor: 'center',
            offset: new AMap.Pixel(0, 0),
            content: '<div class="pulse-marker"><div class="marker-label">' + COMPANY_NAME + '</div></div>'
        });
        map.add(marker);

        var serviceCircle = new AMap.Circle({
            center: COMPANY_CENTER,
            radius: 320,
            strokeColor: '#2ee8ff',
            strokeOpacity: 0.6,
            strokeWeight: 1,
            fillColor: '#2ee8ff',
            fillOpacity: 0.08,
            zIndex: 30
        });
        map.add(serviceCircle);

        var infoWindow = new AMap.InfoWindow({
            isCustom: false,
            offset: new AMap.Pixel(0, -28),
            content: '<div style="line-height:1.7;padding:4px 2px;">' +
                '<b>新疆钧仪衡环境技术有限公司</b><br>' +
                '场景：环境检测报告 / 采样点位 / 实验室能力数字化展示<br>' +
                '坐标：' + COMPANY_CENTER[0] + ', ' + COMPANY_CENTER[1] +
                '</div>'
        });
        marker.on('click', function () {
            infoWindow.open(map, COMPANY_CENTER);
        });

        map.on('complete', function () {
            loca.animate.start();
            buildingLayer.show(900);
            setTimeout(animate, 900);
        });

        document.getElementById('startBtn').addEventListener('click', function () {
            animate();
        });

        function animate() {
            var speed = 1;
            var startCenter = [COMPANY_CENTER[0] - 0.075, COMPANY_CENTER[1] - 0.045];
            buildingLayer.hide(500);
            infoWindow.close();

            map.setZoom(12.4, true);
            map.setPitch(0, true);
            map.setCenter(startCenter, true);
            map.setRotation(0, true);

            // 一、从城市尺度下钻到企业所在区域
            loca.viewControl.addAnimates([{
                center: {
                    value: COMPANY_CENTER,
                    control: [
                        [COMPANY_CENTER[0] - 0.04, COMPANY_CENTER[1] - 0.02],
                        [COMPANY_CENTER[0] - 0.012, COMPANY_CENTER[1] + 0.008]
                    ],
                    timing: [0.2, 0, 0.2, 1],
                    duration: 3600 / speed
                },
                pitch: {
                    value: 55,
                    control: [[0.2, 0], [1, 55]],
                    timing: [0.2, 0, 0.75, 1],
                    duration: 3300 / speed
                },
                zoom: {
                    value: 16.8,
                    control: [[0.2, 12.4], [1, 16.8]],
                    timing: [0.1, 0, 0.75, 1],
                    duration: 3600 / speed
                },
                rotation: {
                    value: -35,
                    control: [[0, 0], [1, -35]],
                    timing: [0.1, 0, 1, 1],
                    duration: 2600 / speed
                }
            }], function () {
                buildingLayer.show(1200);

                // 二、围绕企业楼体进行环绕展示
                loca.viewControl.addAnimates([{
                    pitch: {
                        value: 58,
                        control: [[0, 52], [1, 58]],
                        timing: [0.25, 0, 1, 1],
                        duration: 7200 / speed
                    },
                    rotation: {
                        value: 325,
                        control: [[0, -35], [1, 325]],
                        timing: [0, 0, 0.78, 1],
                        duration: 7200 / speed
                    },
                    zoom: {
                        value: 17.2,
                        control: [[0.2, 16.5], [1, 17.2]],
                        timing: [0.2, 0, 0.9, 1],
                        duration: 5200 / speed
                    }
                }, {
                    // 三、拉升回到总览视角，便于承接项目点位、报告指标等总览模块
                    center: {
                        value: COMPANY_CENTER,
                        control: [
                            [COMPANY_CENTER[0] + 0.002, COMPANY_CENTER[1] - 0.002],
                            [COMPANY_CENTER[0], COMPANY_CENTER[1]]
                        ],
                        timing: [0.25, 0, 0.7, 1],
                        duration: 2400 / speed
                    },
                    pitch: {
                        value: 18,
                        control: [[0, 58], [1, 18]],
                        timing: [0.1, 0, 0.8, 1],
                        duration: 2600 / speed
                    },
                    rotation: {
                        value: 360,
                        control: [[0, 325], [1, 360]],
                        timing: [0.3, 0, 0.7, 1],
                        duration: 2400 / speed
                    },
                    zoom: {
                        value: 15.2,
                        control: [[0, 17.2], [1, 15.2]],
                        timing: [0.2, 0, 0.75, 1],
                        duration: 2600 / speed
                    }
                }], function () {
                    console.log('新疆钧仪衡环境技术有限公司 3D 环视结束');
                });
            });
        }
    </script>
</body>

</html>
